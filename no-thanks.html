<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No worries 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Petit+Formal+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b14;
    --accent: #c084fc;
    --accent2: #e879f9;
    --text: #f0eaff;
    --text-dim: rgba(240, 234, 255, 0.45);
    --surface: #16131f;
    --border: rgba(200, 160, 255, 0.12);
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    color: var(--text);
    overflow: hidden;
    position: relative;
    padding: 24px;
  }
 
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(192, 132, 252, 0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(232, 121, 249, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }
 
  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.08; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.4); }
  }
 
  /* ---- CARD ---- */
  .card {
    position: relative; z-index: 2;
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px 36px;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.5),
      0 0 0 1px rgba(192, 132, 252, 0.08),
      0 0 60px rgba(192, 132, 252, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeUp 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) both;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
 
  /* ---- SCRIPT LABEL ---- */
  .script-label {
    font-family: 'Petit Formal Script', cursive;
    font-size: 17px;
    color: var(--accent);
    opacity: 0.8;
    text-align: center;
  }
 
  /* ---- GIF FRAME ---- */
  .gif-frame {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(192, 132, 252, 0.15);
    background: #0d0b14;
    position: relative;
    /* Fixed aspect ratio — adjust if your GIF is different */
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
 
  .gif-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
 
  .gif-frame img.loaded { opacity: 1; }
 
  /* Placeholder shown before GIF is added */
  .gif-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    transition: opacity 0.3s;
  }
  .gif-placeholder.hidden { opacity: 0; pointer-events: none; }
 
  .gif-placeholder::before {
    content: '';
    position: absolute; inset: 14px;
    border: 1.5px dashed rgba(192, 132, 252, 0.2);
    border-radius: 8px;
  }
 
  .placeholder-icon { font-size: 38px; opacity: 0.3; }
  .placeholder-text {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.5;
  }
 
  /* ---- CAPTION ---- */
  .caption {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
 
  .caption-main {
    font-size: clamp(17px, 4vw, 21px);
    font-weight: 300;
    line-height: 1.65;
    color: var(--text);
    letter-spacing: 0.01em;
  }
 
  .caption-main em {
    font-style: italic;
    color: var(--accent);
  }
 
  /* Decorative rule */
  .caption::before {
    content: '✦  ✦  ✦';
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(192, 132, 252, 0.3);
  }
</style>
</head>
<body>
 
<div class="stars" id="stars"></div>
 
<div class="card">
 
  <div class="script-label">✦ I needed to tell you eventually ✦</div>
 
  <!-- GIF FRAME
       HOW TO ADD YOUR GIF:
       Replace src="" with your gif path, e.g. src="images/mygif.gif"
       The placeholder disappears automatically once it loads.
  -->
  <div class="gif-frame">
    <img
      id="gifImg"
      src="images/leonBro.gif"
      alt="a little something"
      onload="this.classList.add('loaded'); document.getElementById('gifPlaceholder').classList.add('hidden')"
    >
    <div class="gif-placeholder" id="gifPlaceholder">
      <div class="placeholder-icon">🎞️</div>
      <div class="placeholder-text">Add your GIF here</div>
    </div>
  </div>
 
  <!-- CAPTION -->
  <div class="caption">
    <div class="caption-main">
      If you don't hate me, we can still be friends.<br>
      <em>I truly don't want to ruin our friendship.</em>
    </div>
  </div>
 
</div>
 
<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${sz}px;height:${sz}px;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;opacity:${0.1+Math.random()*0.3};`;
    starsEl.appendChild(s);
  }
</script>
</body>
</html>
