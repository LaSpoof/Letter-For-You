<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>It's a date ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Petit+Formal+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b14;
    --accent: #c084fc;
    --accent2: #e879f9;
    --text: #f0eaff;
    --text-dim: rgba(240, 234, 255, 0.45);
    --border: rgba(200, 160, 255, 0.12);
    --surface: #16131f;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    min-height: 100vh;
    height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    font-family: 'Cormorant Garamond', serif;
    color: var(--text);
    overflow: hidden;
    position: relative;
  }
 
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 85%, rgba(192, 132, 252, 0.14) 0%, transparent 55%),
      radial-gradient(ellipse at 15% 20%, rgba(192, 132, 252, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, rgba(232, 121, 249, 0.05) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }
 
  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.08; transform: scale(1); }
    50% { opacity: 0.65; transform: scale(1.4); }
  }
 
  /* ---- TOP MESSAGE ---- */
  .top-message {
    position: relative; z-index: 2;
    text-align: center;
    padding: 44px 24px 0;
    animation: fadeDown 1s cubic-bezier(0.34, 1.2, 0.64, 1) 0.3s both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  .script-label {
    font-family: 'Petit Formal Script', cursive;
    font-size: 17px;
    color: var(--accent);
    opacity: 0.85;
    display: block;
    margin-bottom: 12px;
  }
 
  .main-title {
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 300;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 55%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }
 
  .subtitle {
    font-size: 16px;
    font-style: italic;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }
 
  .summary {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 18px;
    animation: fadeDown 1s ease 0.6s both;
  }
  .pill {
    padding: 6px 16px;
    border: 1px solid rgba(192, 132, 252, 0.28);
    border-radius: 30px;
    font-size: 13px;
    color: var(--accent);
    background: rgba(192, 132, 252, 0.07);
    letter-spacing: 0.05em;
  }
 
  /* ---- CANVAS ---- */
  .canvas-wrap {
    position: relative; z-index: 2;
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 0;
  }
 
  #flowerCanvas {
    display: block;
    max-width: 100%;
  }
 
  /* ---- FOOTER ---- */
  .footer {
    position: relative; z-index: 2;
    text-align: center;
    padding: 14px 24px 30px;
    animation: fadeDown 1s ease 5s both;
  }
  .footer-text {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(192, 132, 252, 0.35);
  }
 
  /* Floating petals */
  .petal-float {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    animation: petalDrift linear infinite;
    z-index: 1;
    font-size: 12px;
  }
  @keyframes petalDrift {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    8%   { opacity: 0.75; }
    92%  { opacity: 0.35; }
    100% { transform: translateY(-100vh) rotate(480deg); opacity: 0; }
  }
</style>
</head>
<body>
 
<div class="stars" id="stars"></div>
 
<div class="top-message">
  <span class="script-label">it's official ✦</span>
  <h1 class="main-title">YAY, I can't wait!</h1>
  <p class="subtitle">This is going to be such a wonderful night.<br>I'm so glad you said yes. 🤍</p>
  <div class="summary" id="summary"></div>
</div>
 
<div class="canvas-wrap">
  <canvas id="flowerCanvas"></canvas>
</div>
 
<div class="footer">
  <div class="footer-text">✦ &nbsp; made with love &nbsp; ✦</div>
</div>
 
<script>
// ---- Stars ----
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 0.5;
  s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${sz}px;height:${sz}px;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;opacity:${0.1+Math.random()*0.3};`;
  starsEl.appendChild(s);
}
 
// ---- URL params ----
const params = new URLSearchParams(window.location.search);
const summaryEl = document.getElementById('summary');
[['date','📅'],['time','🕐'],['restaurant','🍽️']].forEach(([key, icon]) => {
  const val = params.get(key);
  if (val) {
    const p = document.createElement('div');
    p.className = 'pill';
    p.textContent = icon + ' ' + val;
    summaryEl.appendChild(p);
  }
});
 
// ---- Canvas setup ----
const canvas = document.getElementById('flowerCanvas');
const ctx = canvas.getContext('2d');
 
function resize() {
  const wrap = canvas.parentElement;
  const W = Math.min(wrap.clientWidth, 480);
  const H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });
 
// ---- Petal colour palette ----
const petalPalette = [
  ['#f0abfc','#c084fc'],  // lavender-magenta
  ['#ddd6fe','#9333ea'],  // lilac-violet
  ['#e879f9','#7c3aed'],  // pink-deep violet
  ['#d8b4fe','#a855f7'],  // pale purple
  ['#f5d0fe','#c026d3'],  // pale pink-purple
];
 
// ---- Draw a single floret ----
// cx,cy = center of floret, r = petal length, progress 0→1
function drawFloret(cx, cy, r, colorPair, progress) {
  if (progress <= 0) return;
  const p = Math.min(progress, 1);
  const [light, dark] = colorPair;
 
  // 4 petals at 0, 90, 180, 270 degrees
  for (let i = 0; i < 4; i++) {
    const angle = (Math.PI / 2) * i;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
 
    // Petal shape: teardrop using bezier curves
    // Tip is at (0, -r), base at (0, 0)
    const pw = r * 0.52; // petal half-width at widest
    const tipY = -r * p;
    const bulgeY = -r * 0.45 * p;
 
    const grad = ctx.createLinearGradient(0, 0, 0, tipY);
    grad.addColorStop(0, dark + 'cc');
    grad.addColorStop(0.4, light + 'ee');
    grad.addColorStop(1, light + '99');
 
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo( pw * p, -r * 0.15 * p,  pw * p, bulgeY,  0, tipY);
    ctx.bezierCurveTo(-pw * p, bulgeY,         -pw * p, -r * 0.15 * p,  0, 0);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
 
    // Subtle vein
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, tipY);
    ctx.strokeStyle = dark + '44';
    ctx.lineWidth = 0.8;
    ctx.stroke();
 
    ctx.restore();
  }
 
  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.22 * p, 0, Math.PI * 2);
  const cgrad = ctx.createRadialGradient(cx - r*0.06, cy - r*0.06, 0, cx, cy, r * 0.22 * p);
  cgrad.addColorStop(0, '#faf5ff');
  cgrad.addColorStop(1, '#e9d5ff');
  ctx.fillStyle = cgrad;
  ctx.fill();
}
 
// ---- Floret cluster positions ----
// Rings of florets arranged in a hydrangea dome
function buildFlorets(ox, oy) {
  const florets = [];
  const rings = [
    { r: 0,   count: 1,  angleOff: 0,   size: 16 },
    { r: 30,  count: 6,  angleOff: 0,   size: 14 },
    { r: 57,  count: 10, angleOff: 18,  size: 13 },
    { r: 83,  count: 13, angleOff: 8,   size: 11.5 },
  ];
  let idx = 0;
  for (const ring of rings) {
    for (let i = 0; i < ring.count; i++) {
      const a = (ring.angleOff + (360 / ring.count) * i) * Math.PI / 180;
      florets.push({
        x: ox + ring.r * Math.sin(a),
        y: oy - ring.r * Math.cos(a),
        size: ring.size,
        color: petalPalette[idx % petalPalette.length],
      });
      idx++;
    }
  }
  return florets;
}
 
// ---- Animation state ----
let startTime = null;
 
// Timing (seconds)
const T_STEM_START  = 0.4;
const T_STEM_END    = 1.7;
const T_LEAF1_START = 1.6;
const T_LEAF1_END   = 2.2;
const T_LEAF2_START = 1.9;
const T_LEAF2_END   = 2.5;
const T_BLOOM_START = 2.3;
const T_BLOOM_STAGGER = 0.055; // seconds between each floret
 
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
 
function draw(ts) {
  if (!startTime) startTime = ts || performance.now();
  const elapsed = ((ts || performance.now()) - startTime) / 1000;
 
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
 
  const cx = W / 2;
  // Stem base at bottom, bloom center sits ~65% up
  const stemBaseY = H;
  const bloomCY   = H * 0.32;
  const stemTopY  = bloomCY + 10;
 
  const florets = buildFlorets(cx, bloomCY);
 
  // ---- STEM ----
  const stemP = clamp01((elapsed - T_STEM_START) / (T_STEM_END - T_STEM_START));
  if (stemP > 0) {
    // Draw stem from base up to current progress point
    const currentStemTop = stemBaseY - (stemBaseY - stemTopY) * easeInOut(stemP);
 
    const stemGrad = ctx.createLinearGradient(cx - 4, 0, cx + 4, 0);
    stemGrad.addColorStop(0, '#3d6b4a');
    stemGrad.addColorStop(1, '#5a8f6a');
 
    ctx.beginPath();
    // Gentle S-curve stem
    ctx.moveTo(cx, stemBaseY);
    ctx.bezierCurveTo(
      cx + 12, stemBaseY - (stemBaseY - currentStemTop) * 0.3,
      cx - 10, stemBaseY - (stemBaseY - currentStemTop) * 0.65,
      cx, currentStemTop
    );
    ctx.strokeStyle = stemGrad;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.stroke();
 
    // Stem highlight
    ctx.beginPath();
    ctx.moveTo(cx + 1.5, stemBaseY);
    ctx.bezierCurveTo(
      cx + 13, stemBaseY - (stemBaseY - currentStemTop) * 0.3,
      cx - 8,  stemBaseY - (stemBaseY - currentStemTop) * 0.65,
      cx + 1.5, currentStemTop
    );
    ctx.strokeStyle = 'rgba(120, 200, 140, 0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
 
  // ---- LEAF LEFT ----
  const leaf1P = clamp01((elapsed - T_LEAF1_START) / (T_LEAF1_END - T_LEAF1_START));
  if (leaf1P > 0) {
    const p = easeOutBack(leaf1P);
    const lx = cx, ly = stemBaseY - (stemBaseY - stemTopY) * 0.42;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.scale(p, p);
    drawLeaf(ctx, 0, 0, -70, -30, -110, -60, -85, -88, 'left');
    ctx.restore();
  }
 
  // ---- LEAF RIGHT ----
  const leaf2P = clamp01((elapsed - T_LEAF2_START) / (T_LEAF2_END - T_LEAF2_START));
  if (leaf2P > 0) {
    const p = easeOutBack(leaf2P);
    const lx = cx, ly = stemBaseY - (stemBaseY - stemTopY) * 0.62;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.scale(p, p);
    drawLeaf(ctx, 0, 0, 65, -20, 105, -50, 80, -80, 'right');
    ctx.restore();
  }
 
  // ---- BLOOM ----
  florets.forEach((f, i) => {
    const floretStart = T_BLOOM_START + i * T_BLOOM_STAGGER;
    const floretEnd   = floretStart + 0.45;
    const fp = clamp01((elapsed - floretStart) / (floretEnd - floretStart));
    const fpe = easeOutBack(fp);
    if (fpe > 0) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.scale(fpe, fpe);
      ctx.translate(-f.x, -f.y);
      drawFloret(f.x, f.y, f.size, f.color, 1);
      ctx.restore();
    }
  });
 
  // ---- SWAY (after bloom finishes) ----
  const lastFloretDone = T_BLOOM_START + florets.length * T_BLOOM_STAGGER + 0.5;
  // sway is applied implicitly through requestAnimationFrame redraw
  // We re-render the whole bloom with a sway offset if bloom is complete
  if (elapsed > lastFloretDone) {
    const swayElapsed = elapsed - lastFloretDone;
    const swayAngle = Math.sin(swayElapsed * 0.9) * 0.025; // radians, gentle
 
    ctx.clearRect(0, 0, W, H);
 
    // Redraw stem (fully drawn, static)
    const stemGrad = ctx.createLinearGradient(cx - 4, 0, cx + 4, 0);
    stemGrad.addColorStop(0, '#3d6b4a');
    stemGrad.addColorStop(1, '#5a8f6a');
    ctx.beginPath();
    ctx.moveTo(cx, stemBaseY);
    ctx.bezierCurveTo(cx + 12, stemBaseY * 0.7 + stemTopY * 0.3,
                      cx - 10, stemBaseY * 0.35 + stemTopY * 0.65, cx, stemTopY);
    ctx.strokeStyle = stemGrad;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.stroke();
 
    // Leaves
    ctx.save();
    ctx.translate(cx, stemBaseY - (stemBaseY - stemTopY) * 0.42);
    drawLeaf(ctx, 0, 0, -70, -30, -110, -60, -85, -88, 'left');
    ctx.restore();
    ctx.save();
    ctx.translate(cx, stemBaseY - (stemBaseY - stemTopY) * 0.62);
    drawLeaf(ctx, 0, 0, 65, -20, 105, -50, 80, -80, 'right');
    ctx.restore();
 
    // Swaying bloom
    ctx.save();
    ctx.translate(cx, stemTopY);
    ctx.rotate(swayAngle);
    ctx.translate(-cx, -stemTopY);
    florets.forEach(f => drawFloret(f.x, f.y, f.size, f.color, 1));
    ctx.restore();
  }
 
  requestAnimationFrame(draw);
}
 
// ---- Leaf drawing helper ----
function drawLeaf(ctx, x0, y0, cx1, cy1, cx2, cy2, x1, y1, side) {
  const leafGrad = ctx.createLinearGradient(x0, y0, x1, y1);
  leafGrad.addColorStop(0, '#5a8f6a');
  leafGrad.addColorStop(0.5, '#4a7c59');
  leafGrad.addColorStop(1, '#2d5238');
 
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x1, y1);
  ctx.bezierCurveTo(cx2 * 0.3, cy2 * 0.8, cx1 * 0.3, cy1 * 0.5, x0, y0);
  ctx.closePath();
  ctx.fillStyle = leafGrad;
  ctx.fill();
 
  // Vein
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.bezierCurveTo(
    (cx1 + cx2) / 2 * 0.6, (cy1 + cy2) / 2 * 0.6,
    cx2 * 0.5, cy2 * 0.7,
    x1 * 0.85, y1 * 0.85
  );
  ctx.strokeStyle = 'rgba(30, 70, 40, 0.45)';
  ctx.lineWidth = 1;
  ctx.stroke();
}
 
// ---- Start ----
requestAnimationFrame(draw);
 
// ---- Floating petals (after bloom) ----
setTimeout(() => {
  const colors = ['#c084fc','#e879f9','#d8b4fe','#a855f7','#f0abfc'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'petal-float';
    p.textContent = ['✦','·','°','✧','♡'][Math.floor(Math.random()*5)];
    p.style.left = (25 + Math.random() * 50) + 'vw';
    p.style.bottom = '-5px';
    p.style.color = colors[Math.floor(Math.random()*colors.length)];
    p.style.fontSize = (9 + Math.random() * 9) + 'px';
    p.style.animationDuration = (6 + Math.random() * 9) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    document.body.appendChild(p);
  }
}, 4000);
</script>
</body>
</html>
